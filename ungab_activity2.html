<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famous Website Buttons</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;

    background-color:#10213b;

    background-image:
    radial-gradient(circle at top left,
    rgba(112, 115, 255, 0.08),
    transparent 30%),

    linear-gradient(
    135deg,
    #4c40f0,
    #ca3ff5,
    #18777a
    );

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:950px;

    background:rgba(43, 146, 74, 0.45);

    padding:40px;

    border-radius:25px;

    box-shadow:0 0 35px rgba(247, 3, 15, 0.45);

    backdrop-filter:blur(5px);
}

.container h1{
    color:rgb(97, 106, 231);
    font-size:48px;
    margin-bottom:10px;
}

.container p{
    color:#123c7a;
    margin-bottom:35px;
    font-size:18px;
}

.top-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.box{
    flex:1;

    background:#f3f3f3;

    padding:14px;

    border-radius:6px;

    display:flex;
    justify-content:center;
    align-items:center;
}


.middle-row{
    width:48%;
    margin-bottom:20px;
}

.bottom-row{
    width:100%;
}

.uber-btn{
    background:black;
    color:white;
    border:none;

    width:155px;
    height:55px;

    font-size:20px;
    cursor:pointer;
}

.amazon-btn{
    background:rgb(255,216,20);
    color:black;
    border:none;

    width:405px;
    height:72px;

    border-radius:36px;

    font-size:22px;
    cursor:pointer;
}

.github-btn{
    background:rgb(46,164,79);
    color:white;
    border:none;

    width:160px;
    height:55px;

    border-radius:8px;

    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.bootstrap1{
    background:rgb(121,82,179);
    color:white;
    border:2px solid #222;
    padding:15px 35px;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
    margin-right:10px;
    cursor:pointer;
}

.bootstrap2{
    background:#efefef;
    color:rgb(108,117,125);
    border:2px solid #cfd4da;
    padding:15px 35px;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.linkedin1{
    background:rgb(10,102,194);
    color:white;
    border:none;
    padding:18px 170px;
    border-radius:40px;
    font-size:20px;
    font-weight:bold;
    margin-right:15px;
    cursor:pointer;
}

.linkedin2{
    background:white;
    color:rgb(10,102,194);
    border:2px solid rgb(10,102,194);
    padding:16px 45px;
    border-radius:40px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <h1>Famous Website</h1>

    <p>
        Uber, Amazon, GitHub, Bootstrap, and LinkedIn button styles
    </p>

    <!-- TOP ROW -->
    <div class="top-row">

        <div class="box">
            <button class="uber-btn">
                Request now
            </button>
        </div>

        <div class="box">
            <button class="amazon-btn">
                Add to Cart
            </button>
        </div>

        <div class="box">
            <button class="github-btn">
                Sign up
            </button>
        </div>

    </div>

    <!-- MIDDLE ROW -->
    <div class="middle-row box">

        <button class="bootstrap1">
            Get started
        </button>

        <button class="bootstrap2">
            Download
        </button>

    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row box">

        <button class="linkedin1">
            Apply on company website
        </button>

        <button class="linkedin2">
            Save
        </button>

    </div>

</div>

</body>
</html>
