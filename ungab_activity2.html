<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Page</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Poppins",sans-serif;
    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #111827
    );

    color:white;
}

/* HERO SECTION */

.hero{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;
}

.hero-content{
    max-width:700px;
    text-align:center;
}

.hero-content h1{
    font-size:64px;
    margin-bottom:20px;
    line-height:1.1;
}

.hero-content p{
    font-size:18px;
    color:#cbd5e1;
    margin-bottom:35px;
    line-height:1.8;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    padding:16px 38px;

    border:none;
    border-radius:50px;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;
}

/* Primary Button */

.primary-btn{
    background:#3b82f6;
    color:white;
}

.primary-btn:hover{
    background:#2563eb;
    transform:translateY(-3px);
}

/* Secondary Button */

.secondary-btn{
    background:transparent;
    color:white;

    border:2px solid rgba(255,255,255,0.2);
}

.secondary-btn:hover{
    background:rgba(255,255,255,0.08);
    transform:translateY(-3px);
}

/* Responsive */

@media(max-width:768px){

    .hero-content h1{
        font-size:42px;
    }

    .hero-content p{
        font-size:16px;
    }

}

</style>
</head>

<body>

<section class="hero">

    <div class="hero-content">

        <h1>
            Ako si Alvin Ungab
        </h1>

        <p>
            FIELD OF SPECIALIZATION:
Photo Manipulation |
Video Editing |
Graphic Designer |
Logo Designing |
Digital Illustrations |
3D Modeling (Onshape)

        </p>

        <div class="buttons">

            <button class="btn primary-btn">
                Get Started
            </button>

            <button class="btn secondary-btn">
                Learn More
            </button>

        </div>

    </div>

</section>

</body>
</html>
